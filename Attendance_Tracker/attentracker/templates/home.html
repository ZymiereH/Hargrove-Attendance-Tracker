{% extends "design.html" %}
{% block content%}
    {% for names in names %}
        <article class="media content-section">
            <div class="media-body">
                <div class="article-metadata">
                    <a class="mr-2" href="#">{{ names.name }}</a>
                    <small class="text-muted">{{ names.location }}</small>
                </div>
                <h4><a class="article-title" href="#">{{ names.status }}</a></h4>
            </div>
        </article>
    {% endfor %}
{% endblock content %}
